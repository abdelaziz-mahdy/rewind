name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  build:
    name: Build (${{ matrix.os }})
    needs: analyze-test
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-${{ matrix.target }}-desktop
      - run: flutter pub get
      - run: flutter build ${{ matrix.target }} --debug
