name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analyze-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test

  build:
    name: Build (${{ matrix.os }})
    needs: analyze-test
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: macos
          - os: windows-latest
            target: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-${{ matrix.target }}-desktop
      - run: flutter pub get
      # ffmpeg_kit_flutter_new's Windows CMake downloads FFmpeg and `tar xf`s
      # it INTO its plugin dir, which Flutter reaches via a symlink under
      # windows/flutter/ephemeral/.plugin_symlinks — and CMake's libarchive
      # refuses to "extract through symlink", failing the build. The package
      # has an escape hatch: FFMPEGKIT_LOCAL_DIR makes it `file(COPY)` a
      # locally-prepared bundle instead of extracting. Prefetch + extract it
      # to a real (non-symlinked) dir and point the env var at it.
      - name: Prefetch FFmpegKit (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: ./tools/prefetch_ffmpegkit_windows.ps1
      - run: flutter test
        if: matrix.target == 'windows'
      - run: flutter build ${{ matrix.target }} --debug
        # CI runners lack the local Apple Development cert pinned in the Xcode
        # project (used on dev machines so TCC grants survive rebuilds). Disable
        # code signing for the build check — no-op on the Windows matrix leg.
        env:
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"

  build-macos-libobs:
    name: Build macOS (real libobs)
    needs: analyze-test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Cache libobs SDK
        uses: actions/cache@v4
        with:
          path: native/third_party/obs
          key: libobs-${{ runner.arch }}-32.1.2-deps-2025-08-23-recipe-3
      - run: bash tools/fetch_libobs.sh
      - run: flutter pub get
      - run: flutter build macos --debug
        env:
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"
      - run: bash tools/bundle_obs_macos.sh build/macos/Build/Products/Debug/rewind.app

  build-windows-libobs:
    name: Build Windows (real libobs)
    needs: analyze-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      # dumpbin.exe/lib.exe (used by fetch_libobs_windows.ps1 to synthesize
      # obs.lib from the official prebuilt obs.dll) need a Visual Studio
      # Developer environment on PATH — windows-latest ships VS but doesn't
      # activate it by default.
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Cache libobs SDK
        uses: actions/cache@v4
        with:
          path: native/third_party/obs
          key: libobs-windows-x64-32.1.2-recipe-3
      - run: ./tools/fetch_libobs_windows.ps1
        shell: pwsh
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      # See the matrix build job's note — avoids ffmpeg_kit's
      # extract-through-symlink failure via FFMPEGKIT_LOCAL_DIR.
      - name: Prefetch FFmpegKit (Windows)
        shell: pwsh
        run: ./tools/prefetch_ffmpegkit_windows.ps1
      # This compiles the real Windows shim path (REWIND_USE_LIBOBS) —
      # the whole point of this job, unlike the stub-mode `build
      # (windows-latest)` leg above.
      - run: flutter build windows --debug
      - run: ./tools/bundle_obs_windows.ps1 build/windows/x64/runner/Debug
        shell: pwsh

  build-linux-libobs:
    name: Build Linux (real libobs)
    needs: analyze-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      # See tools/fetch_libobs_linux.sh's header comment for exactly why
      # each package is needed. Kept as an explicit CI step (rather than
      # inside the script) so the package list stays visible/auditable here.
      - name: Install libobs build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git python3 pkg-config \
            extra-cmake-modules \
            libavcodec-dev libavdevice-dev libavfilter-dev libavformat-dev \
            libavutil-dev libswresample-dev libswscale-dev \
            zlib1g-dev uthash-dev libjansson-dev libsimde-dev \
            libx11-dev libx11-xcb-dev libxcb1-dev libxcb-shm0-dev \
            libxcb-randr0-dev libxcb-xinerama0-dev libxcb-composite0-dev \
            libxcb-xfixes0-dev libxcomposite-dev libdrm-dev \
            libwayland-dev libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev \
            libpipewire-0.3-dev libglib2.0-dev \
            libpulse-dev libx264-dev libva-dev libpci-dev libffmpeg-nvenc-dev \
            clang libgtk-3-dev \
            libkeybinder-3.0-dev libayatana-appindicator3-dev
      - name: Cache libobs SDK
        uses: actions/cache@v4
        with:
          path: native/third_party/obs
          key: libobs-linux-x64-32.1.2-recipe-2
      - run: bash tools/fetch_libobs_linux.sh
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      # This compiles the real Linux shim path (REWIND_USE_LIBOBS) — the
      # whole point of this job. Unlike the macOS/Windows real-libobs jobs,
      # there is no stub-mode `build (ubuntu-latest)` leg to compare
      # against in the matrix above: Flutter Linux desktop plugin support
      # (hotkey_manager, tray_manager, media_kit, file_selector) hasn't been
      # verified yet, so a full `flutter build linux` isn't exercised
      # outside this real-libobs path either way — see
      # native/shim/README.md's Linux section for exactly what that means.
      - run: flutter build linux --debug
