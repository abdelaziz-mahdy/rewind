name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  macos:
    name: Build & package macOS (.dmg)
    runs-on: macos-latest # Apple Silicon runner → arm64
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Real capture needs the pinned libobs SDK; without it the shim builds
      # in stub mode (no clips). Cache key must match ci.yml's.
      - name: Cache libobs SDK
        uses: actions/cache@v4
        with:
          path: native/third_party/obs
          key: libobs-${{ runner.arch }}-32.1.2-deps-2025-08-23-recipe-2
      - run: bash tools/fetch_libobs.sh

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get

      # arm64-only: the fetched libobs is arm64, so a universal
      # (arm64+x86_64) link fails on the x86_64 slice. See the Packaging &
      # CI/CD task in ROADMAP.md for the universal-libobs follow-up.
      - name: Build (release, arm64)
        env:
          FLUTTER_XCODE_ARCHS: arm64
          FLUTTER_XCODE_ONLY_ACTIVE_ARCH: "YES"
          # No local Apple Development cert on CI runners; build unsigned and
          # let bundle_obs_macos.sh ad-hoc re-sign (matches the "unsigned for
          # now — right-click → Open" note in the README).
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: "NO"
        run: flutter build macos --release

      # The Xcode "Bundle libobs runtime" phase runs this during the build,
      # but re-run it explicitly (idempotent) so a toolchain change can't
      # silently ship an app missing its libobs frameworks/plugins.
      - run: bash tools/bundle_obs_macos.sh build/macos/Build/Products/Release/rewind.app

      # Dependency-free DMG (pure hdiutil) — no appdmg/Node, unlike
      # flutter_distributor's macOS backend.
      - name: Package DMG
        run: bash tools/package_macos_dmg.sh build/macos/Build/Products/Release/rewind.app dist/Rewind-macos-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: rewind-macos
          path: dist/Rewind-macos-arm64.dmg

  windows:
    name: Build & package Windows (installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Real capture needs the pinned libobs SDK; without it the shim
      # builds in stub mode (no clips). dumpbin.exe/lib.exe (used to
      # synthesize obs.lib from the official prebuilt obs.dll) need a
      # Visual Studio Developer environment on PATH. Cache key must match
      # ci.yml's.
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Cache libobs SDK
        uses: actions/cache@v4
        with:
          path: native/third_party/obs
          key: libobs-windows-x64-32.1.2-recipe-1
      - run: ./tools/fetch_libobs_windows.ps1
        shell: pwsh

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Bundle libobs runtime
        run: ./tools/bundle_obs_windows.ps1 build/windows/x64/runner/Release
        shell: pwsh

      # Inno Setup is the standard Windows installer builder (also what
      # flutter_distributor wraps for `.exe`); used directly here.
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
        shell: pwsh
      - name: Build installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" tools\windows_installer.iss'
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: rewind-windows
          path: dist/Rewind-windows-setup.exe

  release:
    name: Draft GitHub Release
    needs: [macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
