name: rewind
description: Cross-platform instant-replay and automatic game-clip capture (Windows + macOS).
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0            # dart:ffi helpers for the libobs C shim
  path: ^1.9.0
  path_provider: ^2.1.0 # locate the clips directory per-OS
  hotkey_manager: ^0.2.3 # global hotkey (manual "clip that")
  tray_manager: ^0.5.3   # menu-bar / tray presence

  # Native build hooks — compile & bundle the C shim automatically.
  hooks: ^2.0.2
  code_assets: ^1.2.1
  native_toolchain_c: ^0.19.2
  talker_flutter: ^5.1.17
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  file_selector: ^1.1.0
  ffmpeg_kit_flutter_new: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  ffigen: ^20.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/tray/
