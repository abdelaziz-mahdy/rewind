# ffigen config for the Rewind C shim (see CONTRIBUTING.md → Conventions).
# Regenerate after ANY change to native/shim/rewind_obs.h:
#
#   dart run ffigen
#
# Generates @Native externals (ffi-native mode) against the build hook's
# code asset — the same binding style the previous hand-written file used,
# so no DynamicLibrary.open and no per-OS library placement. The generated
# file is committed (codegen output is a build input for the app, and CI
# doesn't run ffigen).
name: RewindObsBindings
description: >-
  Generated dart:ffi bindings to the Rewind C shim (native/shim/rewind_obs.h).
output: lib/src/obs/rewind_obs_bindings.g.dart
ffi-native:
  asset-id: 'package:rewind/rewind_obs.dart'
headers:
  entry-points:
    - native/shim/rewind_obs.h
functions:
  include:
    - 'rewind_.*'
macros:
  include:
    - 'REWIND_.*'
structs:
  exclude:
    - '.*'
enums:
  exclude:
    - '.*'
unnamed-enums:
  exclude:
    - '.*'
globals:
  exclude:
    - '.*'
typedefs:
  exclude:
    - '.*'
preamble: |
  // GENERATED by ffigen from native/shim/rewind_obs.h — do not edit.
  // Regenerate with `dart run ffigen` (config: ffigen.yaml).
  // ignore_for_file: type=lint, doc_directive_unknown, unused_element, unused_field
